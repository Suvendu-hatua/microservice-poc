spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: secret-key
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8080

logging:
  level:
    org.programming.microservice.apigateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.web: DEBUG
