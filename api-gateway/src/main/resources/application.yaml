spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/product
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/order
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8080

logging:
  level:
    org.programming.microservice.apigateway: DEBUG
    org.springframework.cloud.gateway: INFO
    org.springframework.web: DEBUG
